<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin cấu hình QR và Telegram</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f5f7fb;margin:0;padding:24px;color:#1f2937}
    .wrap{max-width:760px;margin:0 auto}
    .card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.08);margin-bottom:20px}
    h1,h2{margin-top:0}
    .grid{display:grid;gap:16px}
    .field{display:grid;gap:8px}
    input{padding:12px 14px;border:1px solid #d1d5db;border-radius:10px;font-size:15px}
    button{border:0;background:#00b14f;color:#fff;padding:12px 16px;border-radius:10px;font-weight:700;cursor:pointer}
    button.secondary{background:#374151}
    .actions{display:flex;gap:12px;flex-wrap:wrap}
    .muted{color:#6b7280;font-size:14px}
    .preview{display:grid;gap:12px;justify-items:center;text-align:center}
    .preview img{max-width:320px;width:100%;border-radius:12px;border:1px solid #e5e7eb;background:#fff}
    .msg{font-weight:600;white-space:pre-wrap}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Admin cấu hình QR và Telegram</h1>
      <p class="muted">Đăng nhập admin để chỉnh QR thanh toán và cấu hình Telegram. Toàn bộ cấu hình sẽ tự lưu vào file JSON.</p>
      <div class="grid">
        <label class="field"><span>Tài khoản admin</span><input id="username" value="admin"></label>
        <label class="field"><span>Mật khẩu admin</span><input id="password" type="password" value="letuananh"></label>
      </div>
      <div class="actions" style="margin-top:16px">
        <button id="loginBtn">Đăng nhập admin</button>
      </div>
      <div id="loginMsg" class="msg" style="margin-top:12px"></div>
    </div>

    <div class="card">
      <h2>Cấu hình QR</h2>
      <div class="grid">
        <label class="field"><span>Tên ngân hàng</span><input id="bankName" placeholder="VD: VIB"></label>
        <label class="field"><span>Số tài khoản</span><input id="accountNumber" placeholder="VD: 081409781"></label>
        <label class="field"><span>Tên tài khoản</span><input id="accountName" placeholder="VD: NGUYEN VAN A"></label>
        <label class="field"><span>Số tiền</span><input id="amount" type="number" placeholder="VD: 200000"></label>
        <label class="field"><span>Nội dung chuyển khoản</span><input id="transferNote" placeholder="VD: Phi tham gia nhom"></label>
      </div>
      <div class="actions" style="margin-top:16px">
        <button id="saveBtn">Lưu cấu hình</button>
        <button id="loadBtn" class="secondary">Tải lại</button>
      </div>
      <div id="saveMsg" class="msg" style="margin-top:12px"></div>
    </div>

    <div class="card">
      <h2>Cấu hình Telegram</h2>
      <div class="grid">
        <label class="field"><span>Bot Token</span><input id="botToken" placeholder="VD: 123456:ABC..."></label>
        <label class="field"><span>Chat ID</span><input id="chatId" placeholder="VD: 6981556020"></label>
      </div>
      <div class="muted" style="margin-top:12px">Khi người dùng bấm xác nhận đăng ký, hệ thống sẽ gửi: thời gian, họ tên, số điện thoại, loại xe, đời xe về Telegram.</div>
    </div>

    <div class="card preview">
      <h2>Xem trước QR</h2>
      <img id="qrPreview" alt="QR preview">
      <div id="qrText" class="muted"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://driver-uenm.cfd/api';
    let adminToken = localStorage.getItem('admin_qr_token') || '';

    function buildQrUrl(cfg) {
      const bank = encodeURIComponent(String(cfg.bankName || '').trim());
      const stk = encodeURIComponent(String(cfg.accountNumber || '').trim());
      const name = encodeURIComponent(String(cfg.accountName || '').trim());
      const amount = encodeURIComponent(String(Number(cfg.amount) || 0));
      const note = encodeURIComponent(String(cfg.transferNote || '').trim());
      return `https://img.vietqr.io/image/${bank}-${stk}-compact2.png?amount=${amount}&addInfo=${note}&accountName=${name}`;
    }

    async function readJsonSafe(res) {
      const text = await res.text();
      try {
        return JSON.parse(text);
      } catch {
        throw new Error(`API trả về không phải JSON. Status: ${res.status}. Nội dung đầu: ${text.slice(0, 120)}`);
      }
    }

    function getFormConfig() {
      return {
        bankName: document.getElementById('bankName').value.trim(),
        accountNumber: document.getElementById('accountNumber').value.trim(),
        accountName: document.getElementById('accountName').value.trim(),
        amount: Number(document.getElementById('amount').value) || 0,
        transferNote: document.getElementById('transferNote').value.trim(),
        botToken: document.getElementById('botToken').value.trim(),
        chatId: document.getElementById('chatId').value.trim(),
      };
    }

    function fillForm(cfg = {}, telegramCfg = {}) {
      document.getElementById('bankName').value = cfg.bankName || '';
      document.getElementById('accountNumber').value = cfg.accountNumber || '';
      document.getElementById('accountName').value = cfg.accountName || '';
      document.getElementById('amount').value = cfg.amount || 0;
      document.getElementById('transferNote').value = cfg.transferNote || '';
      document.getElementById('botToken').value = telegramCfg.botToken || '';
      document.getElementById('chatId').value = telegramCfg.chatId || '';
      renderPreview();
    }

    function renderPreview() {
      const cfg = getFormConfig();
      document.getElementById('qrPreview').src = buildQrUrl(cfg);
      document.getElementById('qrText').textContent = `${cfg.bankName} | ${cfg.accountNumber} | ${cfg.accountName} | ${Number(cfg.amount || 0).toLocaleString('vi-VN')}đ | ${cfg.transferNote}`;
    }

    async function loadConfig() {
      const headers = adminToken ? { Authorization: `Bearer ${adminToken}` } : {};
      const res = await fetch(API_BASE + (adminToken ? '/api/admin/qr-config' : '/api/qr-config'), { headers });
      const data = await readJsonSafe(res);
      if (!res.ok) throw new Error(data.message || 'Không tải được cấu hình');
      fillForm(data.qrConfig || {}, data.telegramConfig || {});
    }

    async function loginAdmin() {
      const res = await fetch(API_BASE + '/api/auth/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: document.getElementById('username').value.trim(), password: document.getElementById('password').value })
      });
      const data = await readJsonSafe(res);
      if (!res.ok) throw new Error(data.message || 'Đăng nhập thất bại');
      adminToken = data.token;
      localStorage.setItem('admin_qr_token', adminToken);
      document.getElementById('loginMsg').textContent = 'Đăng nhập admin thành công';
    }

    async function saveConfig() {
      if (!adminToken) throw new Error('Vui lòng đăng nhập admin trước');
      const cfg = getFormConfig();
      const res = await fetch(API_BASE + '/api/admin/qr-config', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
        body: JSON.stringify(cfg)
      });
      const data = await readJsonSafe(res);
      if (!res.ok) throw new Error(data.message || 'Lưu thất bại');
      document.getElementById('saveMsg').textContent = 'Đã lưu cấu hình QR và Telegram';
      fillForm(data.qrConfig || cfg, data.telegramConfig || cfg);
    }

    document.getElementById('loginBtn').onclick = async () => {
      try { await loginAdmin(); } catch (e) { document.getElementById('loginMsg').textContent = e.message; }
    };
    document.getElementById('saveBtn').onclick = async () => {
      try { await saveConfig(); } catch (e) { document.getElementById('saveMsg').textContent = e.message; }
    };
    document.getElementById('loadBtn').onclick = async () => {
      try { await loadConfig(); } catch (e) { document.getElementById('saveMsg').textContent = e.message; }
    };
    ['bankName','accountNumber','accountName','amount','transferNote'].forEach((id) => document.getElementById(id).addEventListener('input', renderPreview));
    loadConfig().catch((e) => { document.getElementById('saveMsg').textContent = e.message; });
  </script>
</body>
</html>
